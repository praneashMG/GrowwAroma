    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              cream: '#E8B4B8',
              charcoal: '#1A1A1A',
              maroon: '#7A1E2C',
              purewhite: '#FFFFFF'
            }
          }

    <style>
        /* Smooth theme transitions */
        * { transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease; }
        
        /* Elegant Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes aura-pulse {
            0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.5; }
        }
        
        .animate-float {
            animation: float 7s ease-in-out infinite;
        }
        
        .animate-aura {
            animation: aura-pulse 15s ease-in-out infinite;
        }
        
        .hover-lift {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(122, 30, 44, 0.15);
        }
    </style>
</head>

                        4

                    <div class="relative flex items-center justify-center mx-2">
                        <div class="absolute inset-0 bg-[#E8B4B8] dark:bg-[#7A1E2C] rounded-full blur-2xl opacity-50"></div>
                        
                        <div class="relative w-24 h-32 sm:w-32 sm:h-40 lg:w-40 lg:h-52 bg-[#FFFFFF]/60 dark:bg-[#1A1A1A]/60 backdrop-blur-md border border-[#FFFFFF] dark:border-[#2A2A2A] rounded-full flex flex-col items-center justify-center shadow-2xl">
                            <div class="w-8 h-6 sm:w-10 sm:h-8 bg-[#E8B4B8] dark:bg-[#7A1E2C] rounded-t-lg mb-2 shadow-inner"></div>

                    <span class="text-8xl sm:text-[10rem] lg:text-[12rem] font-serif font-bold text-[#1A1A1A] dark:text-[#FFFFFF] leading-none select-none drop-shadow-xl">
                        4

            </div>
            
            <div class="lg:w-1/2 text-center lg:text-left">

                    <div class="space-y-4 text-[#1A1A1A]/70 dark:text-[#FFFFFF]/70 mb-10 text-sm sm:text-base leading-relaxed">

            </div>
            
        </div>
    </div>

    <script>
        (function() {
            function applyTheme() {
                const htmlElement = document.documentElement;
                let theme = localStorage.getItem('theme');
                if (theme === 'dark') {
                    htmlElement.classList.add('dark');
                } else {
                    htmlElement.classList.remove('dark');
                }
            }
            // Run immediately to prevent flash
            applyTheme();
        })();
    </script>
</body>
</html>
